name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test BuzzKeepr.UnitTests --configuration Release --no-build --verbosity normal

      - name: Integration tests
        # GitHub-hosted ubuntu runners ship with Docker pre-installed,
        # which Testcontainers uses to spin up Postgres for the run.
        run: dotnet test BuzzKeepr.IntegrationTests --configuration Release --no-build --verbosity normal
