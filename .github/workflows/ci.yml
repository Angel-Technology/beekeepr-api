name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  # GitHub is migrating JavaScript actions to Node 24 (default June 2 2026, mandatory
  # Sep 16 2026 — see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/).
  # Opting in early so we don't see deprecation warnings on every run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Unit tests
        run: |
          dotnet test BuzzKeepr.UnitTests \
            --configuration Release --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/unit

      - name: Integration tests
        # GitHub-hosted ubuntu runners ship with Docker pre-installed,
        # which Testcontainers uses to spin up Postgres for the run.
        #
        # The dummy env vars below satisfy the eager validation in
        # `Infrastructure/DependencyInjection.cs` which fires during
        # `WebApplication.CreateBuilder(...)` — *before* the test factory's
        # in-memory config overrides apply. Locally, dotnet user-secrets
        # provides these; CI has no user-secrets so we stub them here.
        # The factory's testcontainers connection string still overrides
        # at host-build time, so tests run against the real container.
        env:
          Email__ResendApiKey:           re_test_dummy_key
          Database__ConnectionString:    Host=ignored;Database=ignored;Username=ignored;Password=ignored
        run: |
          dotnet test BuzzKeepr.IntegrationTests \
            --configuration Release --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/integration

      - name: Coverage summary
        if: always()
        # `coverlet.collector` (already in both test csprojs) emits cobertura.xml during
        # the test runs above. We aggregate them with reportgenerator and dump a markdown
        # summary into the workflow run page. Visibility-only — no PR-blocking gate.
        # See `.claude/testing.md` for the "we don't chase coverage percentages" rationale.
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool > /dev/null
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"MarkdownSummaryGithub" \
            -title:"BuzzKeepr.API" > /dev/null
          {
            echo "## Test coverage"
            echo
            echo "_Visibility only — we do **not** gate on coverage percentage. See \`.claude/testing.md\` for the philosophy._"
            echo
            cat coverage/report/SummaryGithub.md
          } >> "$GITHUB_STEP_SUMMARY"
