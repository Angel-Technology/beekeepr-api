services:
  postgres:
    image: postgres:17
    container_name: buzzkeepr-postgres
    environment:
      POSTGRES_DB: buzzkeepr_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - buzzkeepr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buzzkeepr_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  buzzkeepr_postgres_data:
